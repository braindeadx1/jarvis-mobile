<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>J.A.R.V.I.S.</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div id="app">
        <!-- Status-Leiste oben -->
        <div id="top-bar">
            <span id="connection-dot"></span>
            <span id="connection-text">Verbinde...</span>
        </div>

        <!-- Ambient Particles (fullscreen) -->
        <div id="ambient-particles">
            <span class="amb" style="--x:5%;--y:8%;--d:12;--s:2"></span>
            <span class="amb" style="--x:92%;--y:5%;--d:18;--s:1.5"></span>
            <span class="amb" style="--x:15%;--y:75%;--d:10;--s:2.5"></span>
            <span class="amb" style="--x:80%;--y:85%;--d:15;--s:1.5"></span>
            <span class="amb" style="--x:25%;--y:15%;--d:20;--s:2"></span>
            <span class="amb" style="--x:70%;--y:25%;--d:14;--s:3"></span>
            <span class="amb" style="--x:45%;--y:92%;--d:11;--s:2"></span>
            <span class="amb" style="--x:60%;--y:10%;--d:16;--s:1.5"></span>
            <span class="amb" style="--x:10%;--y:45%;--d:22;--s:2.5"></span>
            <span class="amb" style="--x:88%;--y:50%;--d:13;--s:2"></span>
            <span class="amb" style="--x:35%;--y:30%;--d:19;--s:1.5"></span>
            <span class="amb" style="--x:55%;--y:65%;--d:17;--s:2"></span>
            <span class="amb" style="--x:50%;--y:3%;--d:21;--s:2.5"></span>
            <span class="amb" style="--x:20%;--y:60%;--d:9;--s:1.5"></span>
            <span class="amb" style="--x:75%;--y:70%;--d:24;--s:2"></span>
            <span class="amb" style="--x:40%;--y:48%;--d:15;--s:3"></span>
            <span class="amb" style="--x:8%;--y:88%;--d:13;--s:2"></span>
            <span class="amb" style="--x:65%;--y:40%;--d:20;--s:1.5"></span>
            <span class="amb" style="--x:30%;--y:95%;--d:11;--s:2.5"></span>
            <span class="amb" style="--x:95%;--y:35%;--d:17;--s:2"></span>
        </div>

        <!-- Hauptbereich: Jarvis HUD Reactor -->
        <div id="reactor-container">
            <div id="reactor" class="idle">
                <!-- SVG Ring System -->
                <svg class="reactor-rings" viewBox="0 0 300 300">
                    <!-- Outer tick marks -->
                    <circle class="ring-ticks" cx="150" cy="150" r="142"/>
                    <!-- Ring 1 — outermost, 3 segments -->
                    <circle class="ring r1" cx="150" cy="150" r="135"/>
                    <!-- Ring 2 — counter-rotate, 4 segments -->
                    <circle class="ring r2" cx="150" cy="150" r="115"/>
                    <!-- Ring 3 — 5 segments -->
                    <circle class="ring r3" cx="150" cy="150" r="95"/>
                    <!-- Ring 4 — innermost, 8 segments -->
                    <circle class="ring r4" cx="150" cy="150" r="75"/>
                </svg>

                <!-- Scan sweep -->
                <div class="reactor-scan"></div>

                <!-- Energy pulse ring -->
                <div class="energy-pulse"></div>

                <!-- Core -->
                <div class="reactor-core">
                    <div class="core-inner"></div>
                </div>

                <!-- Orbiting particles -->
                <div class="particles-container">
                    <span class="particle" style="--i:0"></span>
                    <span class="particle" style="--i:1"></span>
                    <span class="particle" style="--i:2"></span>
                    <span class="particle" style="--i:3"></span>
                    <span class="particle" style="--i:4"></span>
                    <span class="particle" style="--i:5"></span>
                    <span class="particle" style="--i:6"></span>
                    <span class="particle" style="--i:7"></span>
                </div>

                <!-- HUD corner brackets -->
                <div class="hud-el hud-tl"></div>
                <div class="hud-el hud-tr"></div>
                <div class="hud-el hud-bl"></div>
                <div class="hud-el hud-br"></div>
            </div>
            <div id="status-text">SYSTEMS ONLINE</div>
        </div>

        <!-- Antwort-Bereich -->
        <div id="response-area">
            <div id="response-text"></div>
        </div>

        <!-- Steuerungsleiste unten -->
        <div id="controls">
            <button id="btn-camera" title="Kamera">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
            </button>
            <button id="btn-talk" title="Sprechen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
            <button id="btn-stop" title="Abbrechen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                </svg>
            </button>
            <button id="btn-shake" title="Shake-Modus">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6.5 6.5l11 11"/>
                    <path d="M21 3l-3.5 3.5"/>
                    <path d="M20 7l1-4-4 1"/>
                    <path d="M3 21l3.5-3.5"/>
                    <path d="M4 17l-1 4 4-1"/>
                    <path d="M15 5l-1.5 1.5"/>
                    <path d="M9 18.5L7.5 20"/>
                </svg>
            </button>
            <button id="btn-clap" title="Klatschen-Modus (Good Morning)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 6L9 17l-5-5"/>
                    <path d="M4 12l2-2 4 4"/>
                    <circle cx="12" cy="5" r="2"/>
                    <path d="M7 3l1 2M17 3l-1 2M12 1v2"/>
                </svg>
            </button>
        </div>

        <!-- Modell-Auswahl -->
        <div id="model-container"></div>

        <!-- Kamera-Overlay -->
        <div id="camera-overlay" class="hidden">
            <video id="camera-preview" autoplay playsinline></video>
            <div id="camera-controls">
                <button id="btn-capture">Foto aufnehmen</button>
                <button id="btn-camera-close">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="/frontend/app.js"></script>
</body>
</html>
