<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>J.A.R.V.I.S.</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div id="app">
        <!-- Status-Leiste oben -->
        <div id="top-bar">
            <span id="connection-dot"></span>
            <span id="connection-text">Verbinde...</span>
        </div>

        <!-- Hauptbereich: Arc Reactor -->
        <div id="reactor-container">
            <div id="reactor" class="idle">
                <div class="reactor-ring ring-outer"></div>
                <div class="reactor-ring ring-middle"></div>
                <div class="reactor-ring ring-inner"></div>
                <div class="reactor-core"></div>
            </div>
            <div id="status-text">Bereit</div>
        </div>

        <!-- Antwort-Bereich -->
        <div id="response-area">
            <div id="response-text"></div>
        </div>

        <!-- Steuerungsleiste unten -->
        <div id="controls">
            <button id="btn-camera" title="Kamera">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
            </button>
            <button id="btn-talk" title="Sprechen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
            <button id="btn-shake" title="Shake-Modus">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6.5 6.5l11 11"/>
                    <path d="M21 3l-3.5 3.5"/>
                    <path d="M20 7l1-4-4 1"/>
                    <path d="M3 21l3.5-3.5"/>
                    <path d="M4 17l-1 4 4-1"/>
                    <path d="M15 5l-1.5 1.5"/>
                    <path d="M9 18.5L7.5 20"/>
                </svg>
            </button>
        </div>

        <!-- Kamera-Overlay -->
        <div id="camera-overlay" class="hidden">
            <video id="camera-preview" autoplay playsinline></video>
            <div id="camera-controls">
                <button id="btn-capture">Foto aufnehmen</button>
                <button id="btn-camera-close">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="/frontend/app.js"></script>
</body>
</html>
